<!doctype html>
<html lang="en">
  <head>
    <title>Delete Player</title>
  </head>
  <body>
    <h1>Delete Player</h1>
    <p>Are you sure you want to delete <strong>{{ player.name }}</strong>?</p>

    <form action="{{ url_for('delete_player', player_id=player.player_id) }}" method="post">
      <input type="submit" value="Yes, Delete Player">
    </form>

    <a href="{{ url_for('roster') }}">Cancel</a>
  </body>
</html>
