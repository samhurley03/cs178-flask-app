<h1>Roster</h1>
<a href="{{ url_for('add_player') }}">Add Player</a>
<table border="1">
    <tr>
        <th>Name</th><th>Position</th><th>Jersey</th><th>Height</th><th>Weight</th><th>Actions</th>
    </tr>
    {% for player in players %}
    <tr>
        <td>{{ player.name }}</td>
        <td>{{ player.position }}</td>
        <td>{{ player.jersey }}</td>
        <td>{{ player.height }}</td>
        <td>{{ player.weight }}</td>
        <td>
            <a href="{{ url_for('edit_player', player_id=player.player_id) }}">Edit</a> |
            <a href="{{ url_for('delete_player', player_id=player.player_id) }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
